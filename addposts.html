<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Adding Posts</title>
</head>
<body>
    <h2>Adding posts...</h2>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBmbviWejB6lDMxQC-yD_mkLxDaFjaOCk",
            authDomain: "k-community-845d3.firebaseapp.com",
            projectId: "k-community-845d3",
            storageBucket: "k-community-845d3.firebasestorage.app",
            messagingSenderId: "290156857078",
            appId: "1:290156857078:web:64f529dd23e3b1e1a34ed7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const posts = [
            { title: "라면 종류 이렇게 많어?", content: "솔직히 라면 처음에 별로 안 좋아했음\n근데 한국 와서 진짜 맛있음\n\n지금 좋아하는 라면:\n- 불닭 라면\n- 신라면\n- 진라마\n- 안성탕면\n\n근데 왜 라면 가게 이렇게 다 있음?\n가장 좋아하는 라면 이름 알려줘!", category: "food", author: "음식왕" },
            { title: "Gimbap really that good?", content: "Okay I am from another country and just tried gimbap for the first time.\n\nAnd wow it is actually fire.\n\nCheese gimbap specifically is on another level.\n\nIs it just me or is gimbap the most underrated Korean food?", category: "food", author: "ForeignerK" },
            { title: "서울 여행 어디 가야 해?", content: "내년 여행 계획 하고 있어!\n\n하고 싶은 것:\n- 먹고 싶음\n- 사진 찍고 싶음\n- 쇼핑 하고 싶음\n\n어디 가면 다 되노?\n\n지금 생각하는 곳:\n- 명동 (쇼핑)\n- 홍대 (젊음)\n- 동대문 (야시장)\n\n추천 좀 해줘!", category: "travel", author: "여행가고싶어" }
        ];

        async function addPosts() {
            for (const post of posts) {
                await addDoc(collection(db, "posts"), {...post, createdAt: new Date().toISOString()});
            }
            document.body.innerHTML = "<h2>게시물 추가 완료!</h2>";
        }
        addPosts();
    </script>
</body>
</html>
