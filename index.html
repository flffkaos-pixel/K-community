<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-community | The Ultimate Global Korea Community</title>
    <meta name="description" content="Join K-community, the premier global platform for K-Pop, Korean life, recipes, beauty, and travel. Share stories, tips, and connect with fans worldwide.">
    <meta name="keywords" content="K-pop, Korea Community, Living in Korea, Korean Recipes, K-beauty, Korea Travel, Seoul hidden gems">
    <meta name="author" content="K-community Team">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/flffkaos-pixel/K-community">
    <meta property="og:title" content="K-community | Global Korea Hub">
    <meta property="og:description" content="Connect with the world through Korean culture. K-Pop, Food, Beauty, and more.">
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <h1 class="logo" id="logo-link">K-community</h1>
                <span id="user-display" class="user-display"></span>
            </div>
            <div class="header-actions">
                <div class="lang-switcher" id="lang-switcher">
                    <button class="lang-btn" data-lang="ko" title="한국어">🇰🇷</button>
                    <button class="lang-btn active" data-lang="en" title="English">🇺🇸</button>
                    <button class="lang-btn" data-lang="ja" title="日本語">🇯🇵</button>
                    <button class="lang-btn" data-lang="zh" title="中文">🇨🇳</button>
                    <button class="lang-btn" data-lang="es" title="Español">🇪🇸</button>
                </div>
                <button id="theme-toggle" class="btn btn-secondary" aria-label="Toggle Theme">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
                <button id="btn-write" class="btn btn-primary">Write Post</button>
            </div>
        </div>
    </header>

    <nav class="nav">
        <div class="nav-container">
            <ul class="category-tabs" id="category-tabs">
                <li class="tab active" data-category="kpop">K-Pop & Ent</li>
                <li class="tab" data-category="living">Living in Korea</li>
                <li class="tab" data-category="food">Food & Recipes</li>
                <li class="tab" data-category="beauty">Beauty & Skincare</li>
                <li class="tab" data-category="travel">Travel & Hidden Spots</li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="content-container">
            <div class="category-info">
                <h2 id="category-title">K-Pop & Entertainment</h2>
                <p id="category-desc">The latest from the world of K-Pop and Korean entertainment.</p>
            </div>
            <div id="posts-container" class="posts-list">
                <!-- Posts will be injected here -->
            </div>
        </div>
    </main>

    <!-- Write Post Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Create New Post</h3>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <form id="post-form" class="post-form">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label for="post-category">Category</label>
                    <select id="post-category" required>
                        <option value="kpop">K-Pop & Entertainment</option>
                        <option value="living">Living in Korea</option>
                        <option value="food">Food & Recipes</option>
                        <option value="beauty">Beauty & Skincare</option>
                        <option value="travel">Travel & Hidden Spots</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="post-title">Title</label>
                    <input type="text" id="post-title" placeholder="Enter post title" required>
                </div>
                <div class="form-group">
                    <label for="post-content">Content</label>
                    <textarea id="post-content" rows="10" placeholder="Share your thoughts..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="post-image" id="label-image">Add Image</label>
                    <input type="file" id="post-image" accept="image/*">
                    <div id="image-preview" class="image-preview"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancel-post" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Post to K-community</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 K-community. All rights reserved.</p>
            <nav class="footer-nav">
                <a href="#">Privacy Policy</a>
                <a href="#">About Us</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </footer>
    <script src="main.js"></script>
</body>
</html>
