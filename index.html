<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GE1BKC2K1Y"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GE1BKC2K1Y');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-community | Global Korea Hub</title>
    <meta name="description" content="Global hub for K-Pop voting, travel, food, and culture.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <h1 class="logo" id="logo-link">K-community</h1>
                <div class="user-badge">
                    <span id="user-display"></span>
                    <button id="btn-change-nickname" class="btn-icon-small" title="Change Nickname">✎</button>
                </div>
            </div>
            <div class="header-actions">
                <div class="lang-switcher" id="lang-switcher">
                    <button class="lang-btn" data-lang="ko">🇰🇷</button>
                    <button class="lang-btn active" data-lang="en">🇺🇸</button>
                    <button class="lang-btn" data-lang="ja">🇯🇵</button>
                    <button class="lang-btn" data-lang="zh">🇨🇳</button>
                    <button class="lang-btn" data-lang="es">🇪🇸</button>
                </div>
                <button id="theme-toggle" class="btn-icon theme-btn">🌙</button>
                <button id="btn-write" class="btn btn-primary">Write Post</button>
            </div>
        </div>
    </header>

    <nav class="nav">
        <div class="nav-container">
            <ul class="category-tabs" id="category-tabs">
                <li class="tab active" data-category="vote" id="tab-vote">⭐ Idol Poll</li>
                <li class="tab" data-category="kpop">K-Pop</li>
                <li class="tab" data-category="living">Living</li>
                <li class="tab" data-category="food">Food</li>
                <li class="tab" data-category="beauty">Beauty</li>
                <li class="tab" data-category="travel">Travel</li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="content-container">
            <div class="content-layout">
                <div class="posts-section">
                    <div class="category-header">
                        <h2 id="category-title">Idol Popularity Poll</h2>
                        <p id="category-desc">Vote for your favorite K-Pop stars!</p>
                    </div>
                    <div id="posts-container" class="posts-list">
                        <!-- Content injected here -->
                    </div>
                </div>
                
                <aside class="sidebar">
                    <div class="trending-card">
                        <h3 id="trending-title">🔥 Trending Now</h3>
                        <ul id="trending-list" class="trending-list"></ul>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- Write Post Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header center-title">
                <h3>Create New Post</h3>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <form id="post-form" class="post-form">
                <input type="hidden" id="post-id">
                <!-- Category is now implicit based on current tab -->
                <div class="form-group">
                    <input type="text" id="post-title" class="input-title" placeholder="Title" required>
                </div>
                <div class="form-group content-area">
                    <div class="toolbar">
                        <button type="button" class="btn-tool" onclick="document.getElementById('post-image').click()">📷 Add Photo</button>
                        <span class="tool-tip">Tip: Drag & drop images here</span>
                    </div>
                    <input type="file" id="post-image" accept="image/*" style="display: none;" multiple>
                    <textarea id="post-content" rows="12" placeholder="Write your story here..." required></textarea>
                    <div id="image-previews" class="image-previews"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancel-post" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Post</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 K-community. All rights reserved.</p>
        </div>
    </footer>
    <script src="main.js"></script>
</body>
</html>
